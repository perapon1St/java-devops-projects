stages:
  - build
  - test
  - push
  - deploy

variables:
  HARBOR_REGISTRY: harbor.example.com
  IMAGE_NAME: $HARBOR_REGISTRY/myproject/myapp
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

build:
  stage: build
  script:
    - docker build -t $IMAGE_NAME:$IMAGE_TAG .
  tags:
    - docker

test:
  stage: test
  script:
    - docker run --rm $IMAGE_NAME:$IMAGE_TAG ./mvnw test
  tags:
    - docker

push:
  stage: push
  script:
    - echo "$HARBOR_PASSWORD" | docker login $HARBOR_REGISTRY -u $HARBOR_USER --password-stdin
    - docker push $IMAGE_NAME:$IMAGE_TAG
    - docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest
    - docker push $IMAGE_NAME:latest
  only:
    - main
  tags:
    - docker


deploy:
  stage: deploy
  script:
    - kubectl set image deployment/myapp myapp=$IMAGE_NAME:$IMAGE_TAG -n production
    - kubectl rollout status deployment/myapp -n production
  only:
    - main
  tags:
    - docker
